    <body>
        <div id="pagetwo">
            <!-- leaderboard -->
            <div class="child-two">
                <div id="headerpagetwo">Leaderboard</div>
                <div id="playersList"></div>
            </div>
            <div id="createleaderboarditems">checking ...</div>
        </div>
        <div style="margin-top: 8px"></div>
        <!-- spacer -->
        <div class="spacer1vh"></div>
        <script>
            //=================================================================================
            // this runs on startup or reload
            //
            //=================================================================================
            // prevent default img menu of options
            document.addEventListener("contextmenu", (event) => {
                event.preventDefault();
            });

            // declare global variables
            var arrPlayersDropdown = [];
            var arrHcpsDropdown = [];
            var data;
            var hcpData;
            var dd = new Date();
            var day = dd.getDay();

            var days = [
                "Sunday",
                "Monday",
                "Tuesday",
                "Wednesday",
                "Thursday",
                "Friday",
                "Saturday",
            ];
            var months = [
                "Jan",
                "Feb",
                "Mar",
                "Apr",
                "May",
                "Jun",
                "Jul",
                "Aug",
                "Sep",
                "Oct",
                "Nov",
                "Dec",
            ];

            //===========================
            // this code runs at startup
            //===========================
            getHcpData();
            // need to set up a couple of arrays from the data in google sheets
            async function getHcpData() {
                var datastream = await fetch(
                    "https://opensheet.elk.sh/177jxMJFqFd6ZDtLf4sLvBkaeIS8MU9drvNXmC_zKP-E/hcpexplain",
                );

                if (!datastream.ok) {
                    const message = `An error has occured: ${datastream.status}`;
                    //throw new Error(message);
                    alert("error: " + message);
                }
                hcpData = await datastream.json();
                document.getElementById("pagetwo").style.display = "block";
                //dd = new Date();
                //day = dd.getDay();
                //
                //having got hcp data, now get results data
                useDataHcp();
                //
                //
            }

            //=============================================================

            //=============================================================
            // functions - run when called
            //=============================================================

            function useDataHcp() {
                console.log("useDataHcp()");
                let container = document.getElementById(
                    "createleaderboarditems",
                );
                // empty container
                container.innerHTML = "";

                //var ii = 0;
                // build screen

                hcpData.forEach((el, i) => {
                    //ii++;
                    let box = document.createElement("div");
                    box.id = "box" + i;
                    box.className = "teamhcp";

                    let name = document.createElement("p");
                    name.id = "namehcp" + i;
                    name.className = "namehcp";
                    name.innerHTML = el.players;

                    let lines1 = document.createElement("p");
                    lines1.id = "line1" + i;
                    lines1.className = "line1";

                    let lines2 = document.createElement("p");
                    lines2.id = "line2" + i;
                    lines2.className = "line2";

                    let lines3 = document.createElement("p");
                    lines3.id = "line3" + i;
                    lines3.className = "line3";

                    let lines4 = document.createElement("p");
                    lines4.id = "line4" + i;
                    lines4.className = "line4";

                    box.appendChild(name);
                    box.appendChild(lines1);
                    box.appendChild(lines2);
                    box.appendChild(lines3);
                    box.appendChild(lines4);

                    //box.appendChild(hcpsadj);

                    container.appendChild(box);
                    // fade the initial view
                    box.style.opacity = 0.3;
                });

                var k = 0;
                // do proper display
                setTimeout(function () {
                    hcpData.forEach((el, i) => {
                        k++;
                        if (el.players !== "") {
                            bodyUpdateHcps(
                                el.players,
                                el.line1,
                                el.line2,
                                el.line3,
                                el.line4,
                                i,
                            );
                        }
                    }, k * 300);
                });
            }

            function bodyUpdateHcps(nom, line1, line2, line3, line4, i) {
                document.getElementById("headerpagetwo").innerText =
                    "Handicap adjustments";

                if (days[day] == "Monday") {
                    for (i = 0; i < 12; i++) {
                        document.getElementsByClassName("line1")[
                            i
                        ].style.display = "";
                        document.getElementsByClassName("line2")[
                            i
                        ].style.display = "none";
                        document.getElementsByClassName("line3")[
                            i
                        ].style.display = "none";
                        document.getElementsByClassName("line4")[
                            i
                        ].style.display = "none";
                    }
                }
                if (days[day] == "Tuesday") {
                    for (i = 0; i < 12; i++) {
                        document.getElementsByClassName("line1")[
                            i
                        ].style.display = "";
                        document.getElementsByClassName("line2")[
                            i
                        ].style.display = "";
                        document.getElementsByClassName("line3")[
                            i
                        ].style.display = "none";
                        document.getElementsByClassName("line4")[
                            i
                        ].style.display = "none";
                    }
                }
                if (days[day] == "Wednesday") {
                    for (i = 0; i < 12; i++) {
                        document.getElementsByClassName("line1")[
                            i
                        ].style.display = "";
                        document.getElementsByClassName("line2")[
                            i
                        ].style.display = "";
                        document.getElementsByClassName("line3")[
                            i
                        ].style.display = "";
                        document.getElementsByClassName("line4")[
                            i
                        ].style.display = "none";
                    }
                }
                if (days[day] == "Thursday") {
                    for (i = 0; i < 12; i++) {
                        document.getElementsByClassName("line1")[
                            i
                        ].style.display = "";
                        document.getElementsByClassName("line2")[
                            i
                        ].style.display = "";
                        document.getElementsByClassName("line3")[
                            i
                        ].style.display = "";
                        document.getElementsByClassName("line4")[
                            i
                        ].style.display = "";
                    }
                }

                let elName = nom;
                hcpData.find((team) => team.players === elName);
                // now sort out positions for same scores

                let AllTeams = Array.from(
                    document.querySelectorAll(".teamhcp"),
                );

                AllTeams.forEach((element, n) => {
                    let elementName = element.querySelector(".namehcp");
                    let elementLine1 = element.querySelector(".line1");
                    let elementLine2 = element.querySelector(".line2");
                    let elementLine3 = element.querySelector(".line3");
                    let elementLine4 = element.querySelector(".line4");
                    if (elementName.innerHTML == elName) {
                        //elementScore.innerHTML = hcps;

                        //element.style.opacity = 1;

                        setTimeout(function () {
                            elementLine1.innerHTML = line1;
                            elementLine2.innerHTML = line2;
                            elementLine3.innerHTML = line3;
                            elementLine4.innerHTML = line4;

                            element.style.opacity = 1;
                        }, n * 300);
                    }
                });
            }

            function initialBodyUpdate(nom, pos) {
                document.getElementById("name" + pos).innerText = nom;
                document.getElementById("position" + pos).innerText = "";
            }
        </script>
