<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <meta content="ie=edge" http-equiv="X-UA-Compatible" />
        <link href="originalgolf.svg" rel="icon" type="image/x-icon" />
        <link rel="apple-touch-icon" sizes="180x180" href="originalgolf.svg" />
        <title>cardrona2026</title>
        <link href="https://fonts.googleapis.com/css?family=Kalam" rel="stylesheet" />
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

        <style>
            * {
                color: cyan;
                background: black;
                font-family: arial;
            }

            body {
                height: 100vh;
            }

            #tee1,
            #tee2,
            #tee3 {
                width: 50vw;
                height: auto;
                //border: 2px solid silver;
                margin-left: 5vw;
                background: gray;
                padding-top: 1vh;
                padding-bottom: 1vh;
                color: blue;
            }

            .pp {
                height: 5vh;
                //width: 50vw;
                border: 2px solid gray;
                display: flex;
                align-items: center;
                text-align: center;
                padding-left: 2vw;
            }

            #buttonmonday {
                position: fixed;
                top: 2vh;
                right: 2vw;
                height: 5vh;
                width: 25vw;
                border: 3px solid silver;
                border-radius: 10px;
            }

            #buttonotherdays {
                position: fixed;
                top: 12vh;
                right: 2vw;
                height: 5vh;
                width: 25vw;
                border: 3px solid silver;
                border-radius: 10px;
            }
        </style>
    </head>
    <body>
        <button id="buttonmonday" onclick="buttonTestMonday()">Monday</button>
        <button id="buttonotherdays" onclick="buttonTestOtherDays()">Other days</button>
        <div id="tee1">
            &nbsp;&nbsp;tee time 1
            <div id="p1" class="pp">test</div>
            <div id="p2" class="pp">test</div>
            <div id="p3" class="pp">test</div>
            <div id="p4" class="pp">test</div>
        </div>

        <div id="tee2">
            &nbsp;&nbsp;tee time 2
            <div id="p5" class="pp">test</div>
            <div id="p6" class="pp">test</div>
            <div id="p7" class="pp">test</div>
            <div id="p8" class="pp">test</div>
        </div>

        <div id="tee3">
            &nbsp;&nbsp;tee time 3
            <div id="p9" class="pp">test</div>
            <div id="p10" class="pp">test</div>
            <div id="p11" class="pp">test</div>
            <div id="p12" class="pp">test</div>
        </div>

        <script>
            arrPlayers = [
                "Andy",
                "Bob",
                "Bryan",
                "Dale",
                "Graham",
                "Joe",
                "JohnD",
                "JohnM",
                "Oz",
                "Peter",
                "Richard",
                "Steve"
            ];

            function buttonTestOtherDays() {
                manipulateArrayOtherDays(arrPlayers);
                shuffle(arrPlayers);
                k = 0;
                for (i = 0; i < arrPlayers.length; i++) {
                    k++;
                    document.getElementById("p" + k).innerText = arrPlayers[i];
                }

                document.getElementById("p11").innerText = "Andy - walking";
                document.getElementById("p12").innerText = "JohnD - walking";

                resetArr();
            }

            function buttonTestMonday() {
                manipulateArrayMonday(arrPlayers);
                shuffle(arrPlayers);
                k = 0;
                for (i = 0; i < arrPlayers.length; i++) {
                    k++;
                    document.getElementById("p" + k).innerText = arrPlayers[i];
                }

                document.getElementById("p9").innerText = "JohnM - walking";
                document.getElementById("p10").innerText = "Joe - walking";
                document.getElementById("p11").innerText = "Andy - walking";
                document.getElementById("p12").innerText = "JohnD - walking";

                resetArr();
            }

            function shuffle(array) {
                let currentIndex = array.length;

                // While there remain elements to shuffle...
                while (currentIndex != 0) {
                    // Pick a remaining element...
                    let randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;

                    // And swap it with the current element.
                    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
                }
            }

            function manipulateArrayMonday(array) {
                // Monday it would just be 8 players who are in buggies (Jmc, Joe, Andy and JD walking)
                // other 3 days it would be 8 in buggies and remains 2 to playwith JD and Andy on foot
                // remove Jmc, Joe, Andy, JD
                var index = array.indexOf("JohnM");
                if (index > -1) {
                    array.splice(index, 1);
                }
                var index = array.indexOf("Joe");
                if (index > -1) {
                    array.splice(index, 1);
                }
                var index = array.indexOf("Andy");
                if (index > -1) {
                    array.splice(index, 1);
                }
                var index = array.indexOf("JohnD");
                if (index > -1) {
                    array.splice(index, 1);
                }
            }

            function manipulateArrayOtherDays(array) {
                // Monday it would just be 8 players who are in buggies (Jmc, Joe, Andy and JD walking)
                // other 3 days it would be 8 in buggies and remains 2 to playwith JD and Andy on foot
                // remove Jmc, Joe, Andy, JD
                var index = array.indexOf("Andy");
                if (index > -1) {
                    array.splice(index, 1);
                }
                var index = array.indexOf("JohnD");
                if (index > -1) {
                    array.splice(index, 1);
                }
            }

            function resetArr() {
                arrPlayers = [
                    "Andy",
                    "Bob",
                    "Bryan",
                    "Dale",
                    "Graham",
                    "Joe",
                    "JohnD",
                    "JohnM",
                    "Oz",
                    "Peter",
                    "Richard",
                    "Steve"
                ];
            }
        </script>
    </body>
</html>
