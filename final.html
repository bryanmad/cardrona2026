    <body>
        <div id="pagetwo">
            <!-- leaderboard -->
            <div class="child-two">
                <div id="headerpagetwo">Leaderboard</div>
                <div id="playersList"></div>
            </div>
            <div id="createleaderboarditems">checking ...</div>
        </div>
        <div style="margin-top: 8px"></div>
        <!-- spacer -->
        <div class="spacer1vh"></div>
        <script>
            //=================================================================================
            // this runs on startup or reload
            //
            //=================================================================================
            // prevent default img menu of options
            document.addEventListener("contextmenu", (event) => {
                event.preventDefault();
            });

            // declare global variables
            var arrPlayersDropdown = [];
            var arrHcpsDropdown = [];
            var data;
            var hcpData;
            var dd = new Date();
            var day = dd.getDay();

            var days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

            //===========================
            // this code runs at startup
            //===========================

            getData();

            //=============================================================
            //=============================================================
            // function start()
            // - initialise everything and do checks etc.
            //=============================================================
            function start() {
                console.log("start()");
                console.log(data);
                // data is sorted with highest score first so test that to see if it >0

                // don't need to choose, just do results
                useDataResults(data);
                document.getElementById("pagetwo").style.display = "block";
            } // end function start()

            //=============================================================
            // functions - run when called
            //=============================================================

            //=============================================================
            // async function getData()
            // - gets results data
            //=============================================================
            async function getData() {
                console.log("getData()");
                var url = "https://opensheet.elk.sh/177jxMJFqFd6ZDtLf4sLvBkaeIS8MU9drvNXmC_zKP-E/resultsfinal";
                try {
                    const dataStream = await fetch(url);
                    if (!dataStream.ok) {
                        throw new Error(`Response status: ${dataStream.status}`);
                    }
                    data = await dataStream.json();
                    // don't need blank players
                    data = data.filter(function (el) {
                        return el.players !== "";
                    });

                    data.sort((a, b) => parseInt(b.playerpoints) - parseInt(a.playerpoints));
                } catch (error) {
                    console.error(error.message);
                }

                x = data[0].playerpoints;
                console.log(typeof x);
                console.log(x);
                if (data[0].playerpoints !== "0") {
                    console.log("start()");
                    start();
                } else {
                    console.log("else");
                    document.getElementById("headerpagetwo").innerText = "Overall results";
                    document.getElementById("pagetwo").style.display = "block";
                    setTimeout(function () {
                        document.getElementById("createleaderboarditems").innerText = "No results - try later";
                    }, 3000);
                }
            }

            function useDataResults(data) {
                console.log("useData()");
                let container = document.getElementById("createleaderboarditems");
                // empty container
                container.innerHTML = "";

                // build screen
                data.forEach((el, i) => {
                    let box = document.createElement("div");
                    box.id = "box" + i;
                    box.className = "team";
                    box.setAttribute("onclick", "showPageThree();return false;");

                    let name = document.createElement("span");
                    name.id = "name" + i;
                    name.className = "name";
                    name.innerHTML = el.players;

                    let scores = document.createElement("span");
                    scores.id = "scores" + i;
                    scores.className = "scores";
                    let position = document.createElement("span");
                    position.id = "position" + i;
                    position.className = "position";
                    position.innerHTML = i; //el.position;

                    box.appendChild(position);
                    box.appendChild(name);
                    box.appendChild(scores);

                    container.appendChild(box);
                    // fade the initial view
                    box.style.opacity = 0.3;
                });

                var k = 0;
                // do proper display
                data.forEach((el) => {
                    k++;
                    setTimeout(function () {
                        if (el.players !== "") {
                            bodyUpdate(el.players, el.playerpoints);
                        }
                    }, k * 300);
                });
            }

            function bodyUpdate(nom, scr) {
                let elName = nom;
                data.find((team) => team.players === elName);
                // now sort out positions for same scores
                var held = 1;
                var heldscore = 0;
                data.forEach((elem, ind) => {
                    if (elem.playerpoints == heldscore) {
                        elem.position = held;
                    } else {
                        elem.position = ind + 1;
                    }
                    held = elem.position;
                    heldscore = elem.playerpoints;
                });
                let AllTeams = Array.from(document.querySelectorAll(".team"));

                AllTeams.forEach((element, n) => {
                    let elementName = element.querySelector(".name");
                    let elementScore = element.querySelector(".scores");
                    if (elementName.innerHTML == elName) {
                        //elementScore.innerHTML = scr;

                        //element.style.opacity = 1;

                        setTimeout(function () {
                            elementScore.innerHTML = scr;
                            element.style.opacity = 1;
                            let elementPos = element.querySelector(".position");
                            elementPos.innerText = data.find((team) => team.players === elementName.innerHTML).position;

                        }, n * 100);
                    }
                });
            }

            function initialBodyUpdate(nom, pos) {
                document.getElementById("name" + pos).innerText = nom;
                document.getElementById("position" + pos).innerText = "";
            }
        </script>
